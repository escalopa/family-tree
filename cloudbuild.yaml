substitutions:
  _REGION: us-central1
  _SERVICE: family-tree-api
  _AR_REPOSITORY: family-tree
  _IMAGE: family-tree-api
  _ALLOWED_ORIGINS: https://family-tree.vercel.app
  _OAUTH_REDIRECT_BASE_URL: https://family-tree.vercel.app
  _OAUTH_ENABLED_PROVIDERS: mock
  _ENABLE_MOCK_AUTH: "true"
  _SEED_TEST_DATA: "true"
  _S3_ENDPOINT: ""
  _S3_REGION: us-east-1
  _S3_BUCKET: family-tree

steps:
  - id: build-backend
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - be/Dockerfile
      - --target
      - production
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPOSITORY}/${_IMAGE}:$BUILD_ID
      - be

  - id: push-backend
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPOSITORY}/${_IMAGE}:$BUILD_ID

  - id: migrate-and-seed
    name: golang:1.25-alpine
    dir: be
    entrypoint: sh
    secretEnv:
      - DATABASE_DSN
    env:
      - SEED_TEST_DATA=${_SEED_TEST_DATA}
    args:
      - -c
      - apk add --no-cache git && sh scripts/deploy-prepare.sh

  - id: deploy-cloud-run
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    args:
      - gcloud
      - run
      - deploy
      - ${_SERVICE}
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPOSITORY}/${_IMAGE}:$BUILD_ID
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --port=8080
      - --memory=512Mi
      - --cpu=1
      - --min-instances=0
      - --max-instances=3
      - --set-env-vars=^~^GIN_MODE=release~LOG_LEVEL=info~ENABLE_HSTS=true~COOKIE_SECURE=true~COOKIE_HTTP_ONLY=true~ALLOWED_ORIGINS=${_ALLOWED_ORIGINS}~OAUTH_REDIRECT_BASE_URL=${_OAUTH_REDIRECT_BASE_URL}~OAUTH_ENABLED_PROVIDERS=${_OAUTH_ENABLED_PROVIDERS}~ENABLE_MOCK_AUTH=${_ENABLE_MOCK_AUTH}~S3_ENDPOINT=${_S3_ENDPOINT}~S3_REGION=${_S3_REGION}~S3_BUCKET=${_S3_BUCKET}
      - --set-secrets=^~^DATABASE_DSN=DATABASE_DSN:latest~JWT_SECRET=JWT_SECRET:latest~S3_ACCESS_KEY=S3_ACCESS_KEY:latest~S3_SECRET_KEY=S3_SECRET_KEY:latest

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/DATABASE_DSN/versions/latest
      env: DATABASE_DSN

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPOSITORY}/${_IMAGE}:$BUILD_ID

options:
  logging: CLOUD_LOGGING_ONLY
