server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/json application/javascript;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Legacy single-tree route. The app is now tree-list first, and concrete
    # tree workspaces live under /trees/:treeId/tree.
    location = /tree {
        return 302 $scheme://$http_host/trees;
    }

    # Do not cache the SPA shell, so new builds pick up route changes
    # immediately while hashed static assets can stay immutable.
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        try_files /index.html =404;
    }

    # Handle React Router
    location / {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        try_files $uri $uri/ /index.html;
    }

    # Error pages
    error_page 404 /index.html;
}
